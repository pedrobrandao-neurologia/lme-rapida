<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LME Rápida — Laudo de Solicitação de Medicamento (SUS)</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['-apple-system', 'BlinkMacSystemFont', 'SF Pro Display', 'SF Pro Text', 'Helvetica Neue', 'Helvetica', 'Arial', 'sans-serif'],
                    },
                }
            }
        }
    </script>

    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.2/html2pdf.bundle.min.js"></script>

    <style>
        * { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background-color: #f5f5f7;
            color: #1d1d1f;
        }

        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* Apple-style focus em inputs do painel de edição */
        .panel input, .panel select, .panel textarea {
            transition: border-color 0.25s ease, box-shadow 0.25s ease;
        }
        .panel input:focus, .panel select:focus, .panel textarea:focus {
            border-color: #0071e3 !important;
            box-shadow: 0 0 0 3px rgba(0, 113, 227, 0.15) !important;
        }

        .apple-btn {
            background: #0071e3;
            color: white;
            border: none;
            border-radius: 980px;
            padding: 12px 24px;
            font-size: 15px;
            font-weight: 500;
            letter-spacing: -0.01em;
            cursor: pointer;
            transition: background 0.2s ease, transform 0.15s ease;
        }
        .apple-btn:hover { background: #0077ed; }
        .apple-btn:active { transform: scale(0.98); }
        .apple-btn:disabled { background: #d2d2d7; cursor: not-allowed; }

        /* =========================================================
           PREVIEW E IMPRESSÃO - LAYOUT FIEL AO PDF DO SUS
           ========================================================= */

        /* Página A4 (preview na tela) */
        .lme-page {
            width: 210mm;
            min-height: 297mm;
            max-height: 297mm;
            background: white;
            padding: 5mm 6mm;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.06), 0 1px 2px rgba(0, 0, 0, 0.04);
            margin: 0 auto 2rem auto;
            font-family: Arial, Helvetica, sans-serif;
            color: #000;
            font-size: 7.8pt;
            line-height: 1.2;
            box-sizing: border-box;
            overflow: hidden;
        }

        /* Cabeçalho institucional SUS */
        .lme-header {
            display: flex;
            align-items: center;
            justify-content: flex-start;
            gap: 6mm;
            padding: 1mm 2mm 1.5mm 2mm;
        }
        .lme-header .sus-logo {
            width: 26mm;
            height: 16mm;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .lme-header .sus-logo img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            display: block;
        }
        .lme-header .institutional {
            font-size: 8pt;
            line-height: 1.25;
            color: #000;
        }
        .lme-header .institutional p { margin: 0; }

        /* Barras de título */
        .lme-title-bar {
            font-weight: bold;
            text-align: center;
            padding: 1mm 0;
            font-size: 9pt;
            letter-spacing: 0.01em;
            margin: 0;
            border: 0;
        }
        /* 1) COMPONENTE ESPECIALIZADO — fundo preto, texto branco */
        .lme-title-1 {
            background: #000;
            color: #fff;
        }
        /* 2) LAUDO DE SOLICITAÇÃO — degradê cinza (escuro->claro), texto preto */
        .lme-title-2 {
            background: linear-gradient(to bottom, #6e6e6e 0%, #c8c8c8 60%, #e8e8e8 100%);
            color: #000;
        }
        /* 3) SOLICITAÇÃO DE MEDICAMENTO(S) — fundo branco, texto preto */
        .lme-title-3 {
            background: #fff;
            color: #000;
        }

        /* Sub-barra de seção: fundo branco, texto preto, borda preta 1pt */
        .lme-section-bar {
            background: #fff;
            color: #000;
            font-weight: bold;
            text-align: center;
            padding: 1mm 0;
            font-size: 8pt;
            margin: 0;
            border: 1pt solid #000;
        }

        /* Box de campo (fieldset visual) */
        .lme-field {
            border: 1px solid #000;
            border-radius: 2.2mm;
            padding: 2.2mm 2mm 1.3mm 2mm;
            position: relative;
            background: #eef4fb;
            min-height: 7mm;
        }
        .lme-field-label {
            position: absolute;
            top: -1.4mm;
            left: 2mm;
            background: #fff;
            padding: 0 1mm;
            font-size: 6.5pt;
            font-weight: normal;
            color: #000;
            line-height: 1;
        }

        .lme-field-value {
            font-size: 8.5pt;
            min-height: 3.5mm;
            color: #000;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        /* Linhas de campos (grid) */
        .lme-row {
            display: grid;
            gap: 1.2mm;
            margin-top: 1.2mm;
        }

        /* Tabela de medicamentos (campos 7+8) */
        .lme-meds-table {
            width: 100%;
            border-collapse: collapse;
            border: 1px solid #000;
            border-radius: 2.2mm;
            overflow: hidden;
            margin-top: 1.2mm;
            background: #eef4fb;
            font-size: 7.5pt;
        }
        .lme-meds-table th, .lme-meds-table td {
            border: 1px solid #000;
            padding: 0.5mm 1mm;
            vertical-align: middle;
        }
        .lme-meds-table th {
            background: #dde7f1;
            font-weight: bold;
            font-size: 7pt;
            text-align: center;
        }
        .lme-meds-table .col-num { width: 5mm; text-align: center; font-weight: bold; }
        .lme-meds-table .col-med { text-align: left; }
        .lme-meds-table .col-qty { width: 16mm; text-align: center; }
        .lme-meds-table tbody tr { height: 6mm; }

        /* Checkbox visual (quadradinho) */
        .lme-cb {
            display: inline-flex;
            align-items: center;
            gap: 1.2mm;
            margin-right: 2.5mm;
            font-size: 8pt;
            line-height: 1;
        }
        .lme-cb-box {
            width: 2.8mm;
            height: 2.8mm;
            border: 1px solid #000;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: #fff;
            font-size: 8pt;
            line-height: 1;
            font-weight: bold;
            flex-shrink: 0;
        }
        .lme-cb-box.checked::after {
            content: "X";
            font-size: 7pt;
            color: #000;
            font-weight: bold;
        }

        /* Rodapé */
        .lme-footer {
            margin-top: 1.5mm;
            font-size: 7pt;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .lme-footer .obrigatorio { color: #000; }
        .lme-footer .suporte { color: #d00; font-style: italic; }

        /* Texto do bloco 13 (atestado) */
        .lme-atestado-text {
            font-size: 7.2pt;
            line-height: 1.25;
            margin-bottom: 1mm;
            text-align: justify;
        }

        /* Espaços entre seções */
        .lme-section + .lme-section { margin-top: 1.2mm; }

        /* =========================================================
           IMPRESSÃO: o preview JÁ É o que vai ser impresso
           ========================================================= */
        @media print {
            @page {
                size: A4;
                margin: 0;
            }
            html, body {
                background: #fff !important;
                margin: 0 !important;
                padding: 0 !important;
            }
            .no-print { display: none !important; }

            .print-area { display: block !important; }
            .print-area .lme-page {
                box-shadow: none !important;
                margin: 0 !important;
                page-break-after: always;
            }
            .print-area .lme-page:last-child { page-break-after: auto; }
        }
        @media screen {
            .print-area { display: none; }
        }

        /* Mobile: encolhe preview */
        @media screen and (max-width: 900px) {
            .lme-page {
                width: 100% !important;
                min-height: auto !important;
                padding: 4mm !important;
                font-size: 8pt;
            }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useCallback, useRef } = React;

        // ========= ÍCONES =========
        const Icons = {
            Settings: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>,
            Printer: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>,
            Download: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>,
            Eraser: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20 20H7L3 16c-.8-.8-.8-2 0-2.8L14.6 1.6c.8-.8 2-.8 2.8 0L21.4 5.6c.8.8.8 2 0 2.8L10 20"/><path d="M6 12l6 6"/></svg>,
            Trash: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>,
            Search: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>,
            Calendar: () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>,
        };

        // ========= CID-10 (foco neuro/comum) =========
        const CID10_DATABASE = [
            { code: 'G20', desc: 'Doença de Parkinson' },
            { code: 'G24', desc: 'Distonia' },
            { code: 'G25.0', desc: 'Tremor essencial' },
            { code: 'G30', desc: 'Doença de Alzheimer' },
            { code: 'G30.0', desc: 'Doença de Alzheimer de início precoce' },
            { code: 'G30.1', desc: 'Doença de Alzheimer de início tardio' },
            { code: 'G31.0', desc: 'Atrofia cerebral circunscrita (demência frontotemporal)' },
            { code: 'G35', desc: 'Esclerose múltipla' },
            { code: 'G40', desc: 'Epilepsia' },
            { code: 'G40.0', desc: 'Epilepsia focal idiopática' },
            { code: 'G40.1', desc: 'Epilepsia focal sintomática' },
            { code: 'G40.2', desc: 'Epilepsia generalizada idiopática' },
            { code: 'G40.3', desc: 'Epilepsia generalizada sintomática' },
            { code: 'G43', desc: 'Enxaqueca' },
            { code: 'G43.0', desc: 'Enxaqueca sem aura' },
            { code: 'G43.1', desc: 'Enxaqueca com aura' },
            { code: 'G43.3', desc: 'Enxaqueca complicada' },
            { code: 'G44.0', desc: 'Cefaleia em salvas' },
            { code: 'G44.2', desc: 'Cefaleia tensional' },
            { code: 'G47.4', desc: 'Narcolepsia e cataplexia' },
            { code: 'G50.0', desc: 'Neuralgia do trigêmeo' },
            { code: 'G51.0', desc: 'Paralisia de Bell' },
            { code: 'G56.0', desc: 'Síndrome do túnel do carpo' },
            { code: 'G61.0', desc: 'Síndrome de Guillain-Barré' },
            { code: 'G70.0', desc: 'Miastenia gravis' },
            { code: 'G71.0', desc: 'Distrofia muscular' },
            { code: 'G80', desc: 'Paralisia cerebral' },
            { code: 'G91.2', desc: 'Hidrocefalia de pressão normal' },
            { code: 'G12.2', desc: 'Doença do neurônio motor (ELA)' },
            { code: 'I63.9', desc: 'Infarto cerebral, não especificado' },
            { code: 'I64', desc: 'Acidente vascular cerebral (AVC)' },
            { code: 'I69', desc: 'Sequelas de doenças cerebrovasculares' },
            { code: 'M79.7', desc: 'Fibromialgia' },
            { code: 'F03', desc: 'Demência, não especificada' },
            { code: 'L40', desc: 'Psoríase' },
            { code: 'M05', desc: 'Artrite reumatoide soropositiva' },
            { code: 'M06', desc: 'Outras artrites reumatoides' },
            { code: 'M45', desc: 'Espondilite ancilosante' },
            { code: 'K50', desc: 'Doença de Crohn' },
            { code: 'K51', desc: 'Colite ulcerativa' },
            { code: 'E10', desc: 'Diabetes mellitus tipo 1' },
            { code: 'E11', desc: 'Diabetes mellitus tipo 2' },
            { code: 'N18', desc: 'Doença renal crônica' },
        ];

        const stripDiacritics = (s) => (s || '').toLowerCase().normalize("NFD").replace(new RegExp("[\\u0300-\\u036f]", "g"), "");
        const searchCID10 = (query) => {
            if (!query || query.length < 2) return [];
            const q = stripDiacritics(query);
            return CID10_DATABASE.filter(item => stripDiacritics(`${item.code} ${item.desc}`).includes(q)).slice(0, 10);
        };

        // ========= MÁSCARAS =========
        const onlyDigits = (s) => (s || '').replace(/\D/g, '');
        const formatCPF = (v) => {
            const d = onlyDigits(v).slice(0, 11);
            if (d.length <= 3) return d;
            if (d.length <= 6) return `${d.slice(0,3)}.${d.slice(3)}`;
            if (d.length <= 9) return `${d.slice(0,3)}.${d.slice(3,6)}.${d.slice(6)}`;
            return `${d.slice(0,3)}.${d.slice(3,6)}.${d.slice(6,9)}-${d.slice(9)}`;
        };
        const formatCNS = (v) => {
            const d = onlyDigits(v).slice(0, 15);
            const parts = [];
            if (d.length > 0) parts.push(d.slice(0, 3));
            if (d.length > 3) parts.push(d.slice(3, 7));
            if (d.length > 7) parts.push(d.slice(7, 11));
            if (d.length > 11) parts.push(d.slice(11, 15));
            return parts.join(' ');
        };
        const formatCNES = (v) => onlyDigits(v).slice(0, 7);
        const formatPhone = (v) => {
            const d = onlyDigits(v).slice(0, 11);
            if (d.length <= 2) return d;
            if (d.length <= 6) return `(${d.slice(0,2)}) ${d.slice(2)}`;
            if (d.length <= 10) return `(${d.slice(0,2)}) ${d.slice(2,6)}-${d.slice(6)}`;
            return `(${d.slice(0,2)}) ${d.slice(2,7)}-${d.slice(7)}`;
        };
        const formatDateBR = (isoStr) => {
            if (!isoStr) return '';
            const [y, m, d] = isoStr.split('-');
            if (!y || !m || !d) return '';
            return `${d}/${m}/${y}`;
        };
        const todayISO = () => {
            const d = new Date();
            return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
        };

        // ========= localStorage helper =========
        const loadLS = (key, fallback) => {
            try {
                const v = localStorage.getItem(key);
                return v ? JSON.parse(v) : fallback;
            } catch { return fallback; }
        };

        // ========= LOGO SUS (imagem oficial logosus.png) =========
        const SusLogo = () => (
            <img src="logosus.png" alt="SUS" />
        );

        // ========= COMPONENTE: CHECKBOX VISUAL =========
        const Checkbox = ({ checked, label, children }) => (
            <span className="lme-cb">
                <span className={`lme-cb-box ${checked ? 'checked' : ''}`}></span>
                <span>{label || children}</span>
            </span>
        );

        // ========= COMPONENTE: CAMPO LME (fieldset visual) =========
        const Field = ({ num, label, children, style, className = '' }) => (
            <div className={`lme-field ${className}`} style={style}>
                <span className="lme-field-label">
                    {num && <span style={{fontWeight:'bold'}}>{num}- </span>}
                    {label}
                </span>
                <div className="lme-field-value">{children}</div>
            </div>
        );

        // ========= BUSCA CID-10 =========
        const CID10Search = ({ onSelect, placeholder }) => {
            const [q, setQ] = useState('');
            const [results, setResults] = useState([]);
            const [show, setShow] = useState(false);
            const inputRef = useRef(null);
            const dropRef = useRef(null);

            useEffect(() => {
                if (q.length >= 2) {
                    const r = searchCID10(q);
                    setResults(r);
                    setShow(r.length > 0);
                } else {
                    setResults([]); setShow(false);
                }
            }, [q]);

            useEffect(() => {
                const h = (e) => {
                    if (dropRef.current && !dropRef.current.contains(e.target) &&
                        inputRef.current && !inputRef.current.contains(e.target)) setShow(false);
                };
                document.addEventListener('mousedown', h);
                return () => document.removeEventListener('mousedown', h);
            }, []);

            const handle = (it) => {
                onSelect(it);
                setQ('');
                setShow(false);
            };

            return (
                <div style={{ position: 'relative' }}>
                    <div style={{ position: 'relative' }}>
                        <div style={{ position: 'absolute', left: '12px', top: '50%', transform: 'translateY(-50%)', color: '#86868b' }}>
                            <Icons.Search />
                        </div>
                        <input
                            ref={inputRef}
                            type="text"
                            placeholder={placeholder || "Buscar CID-10 (ex: G43, enxaqueca...)"}
                            value={q}
                            onChange={(e) => setQ(e.target.value)}
                            onFocus={() => { if (results.length > 0) setShow(true); }}
                            className="w-full p-3 pl-10 rounded-xl outline-none text-sm"
                            style={{ border: '1px solid #d2d2d7', color: '#1d1d1f', background: '#fbfbfd' }}
                        />
                    </div>
                    {show && (
                        <div ref={dropRef} style={{
                            position: 'absolute', top: '100%', left: 0, right: 0, zIndex: 50,
                            background: '#fff', border: '1px solid #d2d2d7', borderRadius: '12px',
                            marginTop: '4px', boxShadow: '0 8px 30px rgba(0,0,0,0.12)',
                            maxHeight: '220px', overflowY: 'auto'
                        }}>
                            {results.map(it => (
                                <button key={it.code} onClick={() => handle(it)}
                                    className="w-full text-left px-4 py-3"
                                    style={{ borderBottom: '1px solid #f0f0f2', color: '#1d1d1f' }}
                                    onMouseEnter={(e)=>{ e.currentTarget.style.background='#f5f5f7'; }}
                                    onMouseLeave={(e)=>{ e.currentTarget.style.background='transparent'; }}>
                                    <div className="flex items-center gap-2">
                                        <span className="font-bold text-sm px-2 py-0.5 rounded-lg" style={{ background:'#f0f0f2', color:'#0071e3', fontFamily:'monospace' }}>{it.code}</span>
                                        <span className="text-sm">{it.desc}</span>
                                    </div>
                                </button>
                            ))}
                        </div>
                    )}
                </div>
            );
        };

        // ========================================
        // PÁGINA LME (PREVIEW + IMPRESSÃO)
        // ========================================
        const LMEPage = ({ data }) => {
            const meds = data.medicamentos;
            // Garantir 6 linhas na tabela (preenche com vazio)
            const medRows = [...Array(6)].map((_, i) => meds[i] || { nome: '', q: ['','','','','',''] });

            const racaList = ['branca','preta','parda','amarela','indigena','sem_info'];

            return (
                <div className="lme-page">
                    {/* Cabeçalho institucional */}
                    <div className="lme-header">
                        <div className="sus-logo">
                            <SusLogo />
                        </div>
                        <div className="institutional">
                            <p>Sistema Único de Saúde</p>
                            <p>Ministério da Saúde</p>
                            <p>Secretaria de Estado da Saúde</p>
                        </div>
                    </div>

                    {/* Barras de título */}
                    <div className="lme-title-bar lme-title-1">COMPONENTE ESPECIALIZADO DA ASSISTÊNCIA FARMACÊUTICA</div>
                    <div className="lme-title-bar lme-title-2">LAUDO DE SOLICITAÇÃO, AVALIAÇÃO E AUTORIZAÇÃO DE MEDICAMENTO(S)</div>
                    <div className="lme-title-bar lme-title-3">SOLICITAÇÃO DE MEDICAMENTO(S)</div>

                    {/* Sub-barra: fundo branco, texto preto, borda preta 1pt */}
                    <div className="lme-section-bar" style={{ marginTop: '1mm' }}>
                        CAMPOS DE PREENCHIMENTO EXCLUSIVO PELO MÉDICO SOLICITANTE
                    </div>

                    {/* Linha 1: CNES + Estabelecimento */}
                    <div className="lme-row" style={{ gridTemplateColumns: '38mm 1fr' }}>
                        <Field num="1" label="Número do CNES" required>
                            {data.cnes || ' '}
                        </Field>
                        <Field num="2" label="Nome do estabelecimento de saúde solicitante">
                            {data.estabelecimento || ' '}
                        </Field>
                    </div>

                    {/* Linha 2: Paciente + Peso */}
                    <div className="lme-row" style={{ gridTemplateColumns: '1fr 28mm' }}>
                        <Field num="3" label="Nome completo do Paciente" required>
                            {data.pacienteNome || ' '}
                        </Field>
                        <Field num="5" label="Peso do paciente" required>
                            <span>{data.peso || ' '}</span>
                            <span style={{ float: 'right', fontSize: '8pt', color: '#555' }}>kg</span>
                        </Field>
                    </div>

                    {/* Linha 3: Mãe + Altura */}
                    <div className="lme-row" style={{ gridTemplateColumns: '1fr 28mm' }}>
                        <Field num="4" label="Nome da Mãe do Paciente" required>
                            {data.maeNome || ' '}
                        </Field>
                        <Field num="6" label="Altura do paciente" required>
                            <span>{data.altura || ' '}</span>
                            <span style={{ float: 'right', fontSize: '8pt', color: '#555' }}>cm</span>
                        </Field>
                    </div>

                    {/* Tabela de medicamentos (campos 7 e 8) */}
                    <table className="lme-meds-table">
                        <thead>
                            <tr>
                                <th colSpan={2} style={{ textAlign: 'left', paddingLeft: '3mm' }}>
                                    <span style={{fontSize:'6.5pt'}}>7-</span> <strong>Medicamento(s)</strong>
                                </th>
                                <th colSpan={6}>
                                    <span style={{fontSize:'6.5pt'}}>8-</span> <strong>Quantidade solicitada</strong>
                                </th>
                            </tr>
                            <tr>
                                <th className="col-num">#</th>
                                <th className="col-med"></th>
                                <th className="col-qty">1º mês</th>
                                <th className="col-qty">2º mês</th>
                                <th className="col-qty">3º mês</th>
                                <th className="col-qty">4º mês</th>
                                <th className="col-qty">5º mês</th>
                                <th className="col-qty">6º mês</th>
                            </tr>
                        </thead>
                        <tbody>
                            {medRows.map((m, i) => (
                                <tr key={i}>
                                    <td className="col-num">{i + 1}</td>
                                    <td className="col-med">{m.nome || ' '}</td>
                                    {[0,1,2,3,4,5].map(j => (
                                        <td key={j} className="col-qty">{(m.q && m.q[j]) || ' '}</td>
                                    ))}
                                </tr>
                            ))}
                        </tbody>
                    </table>

                    {/* CID + Diagnóstico */}
                    <div className="lme-row" style={{ gridTemplateColumns: '32mm 1fr' }}>
                        <Field num="9" label="CID-10" required>
                            {data.cid || ' '}
                        </Field>
                        <Field num="10" label="Diagnóstico">
                            {data.diagnostico || ' '}
                        </Field>
                    </div>

                    {/* Anamnese */}
                    <div className="lme-row" style={{ gridTemplateColumns: '1fr' }}>
                        <Field num="11" label="Anamnese" required style={{ minHeight: '22mm' }}>
                            {data.anamnese || ' '}
                        </Field>
                    </div>

                    {/* Tratamento prévio */}
                    <Field num="12" label="Paciente realizou tratamento prévio ou está em tratamento da doença?" required style={{ marginTop: '1.5mm' }}>
                        <div style={{ display: 'flex', alignItems: 'flex-start', flexWrap: 'wrap', gap: '2mm' }}>
                            <Checkbox checked={data.tratamentoPrevio === 'NAO'} label="NÃO" />
                            <Checkbox checked={data.tratamentoPrevio === 'SIM'} label="SIM. Relatar:" />
                            <span style={{ flex: 1, minWidth: '60mm', borderBottom: data.tratamentoPrevioRelato ? 'none' : '1px solid #888' }}>
                                {data.tratamentoPrevioRelato || ' '}
                            </span>
                        </div>
                    </Field>

                    {/* Atestado de capacidade */}
                    <Field num="13" label="Atestado de capacidade" required style={{ marginTop: '1.5mm' }}>
                        <div className="lme-atestado-text">
                            A solicitação do medicamento deverá ser realizada pelo paciente. Entretanto, fica dispensada a obrigatoriedade da presença física do paciente considerado incapaz de acordo com os artigos 3º e 4º do Código Civil. O paciente é considerado incapaz?
                        </div>
                        <div style={{ display: 'flex', alignItems: 'center', flexWrap: 'wrap', gap: '2mm' }}>
                            <Checkbox checked={data.incapaz === 'NAO'} label="NÃO" />
                            <Checkbox checked={data.incapaz === 'SIM'} label="SIM. Indicar o nome do responsável pelo paciente, o qual poderá realizar a solicitação do medicamento" />
                        </div>
                        <div style={{ marginTop: '1.5mm', borderBottom: '1px solid #888', paddingBottom: '1mm', minHeight: '5mm' }}>
                            {data.responsavelNome || ' '}
                            <span style={{ float: 'right', fontSize: '7.5pt', color: '#555' }}>Nome do responsável</span>
                        </div>
                    </Field>

                    {/* Médico (14) + Assinatura (17) */}
                    <div className="lme-row" style={{ gridTemplateColumns: '1fr 65mm' }}>
                        <div style={{ display: 'flex', flexDirection: 'column', gap: '1.5mm' }}>
                            <Field num="14" label="Nome do médico solicitante" required>
                                {data.medicoNome || ' '}
                            </Field>
                            <div className="lme-row" style={{ gridTemplateColumns: '1fr 38mm', marginTop: 0 }}>
                                <Field num="15" label="Número do Cartão Nacional de Saúde (CNS) do médico solicitante" required>
                                    {data.medicoCNS || ' '}
                                </Field>
                                <Field num="16" label="Data da solicitação" required>
                                    {formatDateBR(data.dataSolicitacao) || ' '}
                                </Field>
                            </div>
                        </div>
                        <Field num="17" label="Assinatura e carimbo do médico" style={{ minHeight: '24mm' }}>
                            {' '}
                        </Field>
                    </div>

                    {/* Campo 18 — Quem preencheu (próprio label faz o papel da seção) */}
                    <Field num="18" label="CAMPOS ABAIXO PREENCHIDOS POR" required style={{ marginTop: '2mm' }}>
                        <div style={{ display: 'flex', alignItems: 'center', flexWrap: 'wrap', gap: '1.5mm' }}>
                            <Checkbox checked={data.preenchidoPor === 'paciente'} label="Paciente" />
                            <Checkbox checked={data.preenchidoPor === 'mae'} label="Mãe do paciente" />
                            <Checkbox checked={data.preenchidoPor === 'responsavel'} label="Responsável (descrito no item 13)" />
                            <Checkbox checked={data.preenchidoPor === 'medico'} label="Médico solicitante" />
                            <Checkbox checked={data.preenchidoPor === 'outro'} label="Outro, informar nome:" />
                            <span style={{ flex: 1, minWidth: '40mm', borderBottom: '1px solid #888' }}>{data.outroNome || ' '}</span>
                            <span>e CPF</span>
                            <span style={{ width:'40mm', borderBottom: '1px solid #888' }}>{data.outroCPF || ' '}</span>
                        </div>
                    </Field>

                    {/* Campo 19 (raça) + 20 (telefone) */}
                    <div className="lme-row" style={{ gridTemplateColumns: '1fr 50mm' }}>
                        <Field num="19" label="Raça/Cor/Etnia informado pelo paciente ou responsável" required>
                            <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:'1mm', alignItems:'start' }}>
                                <div>
                                    <div><Checkbox checked={data.raca==='branca'} label="Branca" /></div>
                                    <div><Checkbox checked={data.raca==='preta'} label="Preta" /></div>
                                    <div><Checkbox checked={data.raca==='parda'} label="Parda" /></div>
                                </div>
                                <div>
                                    <div><Checkbox checked={data.raca==='amarela'} label="Amarela" /></div>
                                    <div style={{ display:'flex', alignItems:'center', gap:'1mm' }}>
                                        <Checkbox checked={data.raca==='indigena'} label="Indígena. Informar Etnia:" />
                                        <span style={{ flex:1, borderBottom:'1px solid #888', minWidth:'15mm' }}>{data.etnia || ' '}</span>
                                    </div>
                                    <div><Checkbox checked={data.raca==='sem_info'} label="Sem informação" /></div>
                                </div>
                            </div>
                        </Field>
                        <Field num="20" label="Telefone(s) para contato do paciente">
                            {data.telefone || ' '}
                        </Field>
                    </div>

                    {/* Campo 21 (doc) + 23 (assinatura) */}
                    <div className="lme-row" style={{ gridTemplateColumns: '1fr 60mm' }}>
                        <Field num="21" label="Número do documento do paciente">
                            <div style={{ display:'flex', alignItems:'center', gap:'2mm' }}>
                                <Checkbox checked={data.docTipo==='CPF'} label="CPF" />
                                <span>ou</span>
                                <Checkbox checked={data.docTipo==='CNS'} label="CNS" />
                                <span style={{ flex:1, borderBottom:'1px solid #888', minWidth:'30mm' }}>{data.docNumero || ' '}</span>
                            </div>
                        </Field>
                        <Field num="23" label="Assinatura do responsável pelo preenchimento" style={{ minHeight: '14mm' }}>
                            {' '}
                        </Field>
                    </div>

                    {/* Campo 22 - email */}
                    <Field num="22" label="Correio eletrônico do paciente" style={{ marginTop:'1.5mm' }}>
                        {data.email || ' '}
                    </Field>

                    {/* Rodapé */}
                    <div className="lme-footer">
                        <span></span>
                        <span className="suporte">Para suporte, entre em contato pelo: ceaf.daf@saude.gov.br</span>
                    </div>
                </div>
            );
        };

        // ========================================
        // CAMPO DE INPUT REUTILIZÁVEL (UI Apple)
        // ========================================
        const Input = ({ label, value, onChange, placeholder, type='text', maxLength, helper, hint, rightAddon }) => (
            <div>
                {label && (
                    <label className="block text-xs mb-1.5" style={{ color: '#6e6e73' }}>
                        {label}
                    </label>
                )}
                <div style={{ position:'relative' }}>
                    <input
                        type={type}
                        value={value}
                        onChange={(e)=>onChange(e.target.value)}
                        placeholder={placeholder}
                        maxLength={maxLength}
                        className="w-full text-sm p-2.5 rounded-xl outline-none"
                        style={{ border: '1px solid #d2d2d7', background: '#fff', paddingRight: rightAddon ? '40px' : undefined }}
                    />
                    {rightAddon && (
                        <span style={{ position:'absolute', right:'12px', top:'50%', transform:'translateY(-50%)', fontSize:'12px', color:'#86868b' }}>
                            {rightAddon}
                        </span>
                    )}
                </div>
                {hint && <p className="text-xs mt-1" style={{ color:'#86868b' }}>{hint}</p>}
            </div>
        );

        const Textarea = ({ label, value, onChange, placeholder, rows=3 }) => (
            <div>
                {label && (
                    <label className="block text-xs mb-1.5" style={{ color: '#6e6e73' }}>
                        {label}
                    </label>
                )}
                <textarea
                    value={value}
                    onChange={(e)=>onChange(e.target.value)}
                    placeholder={placeholder}
                    rows={rows}
                    className="w-full text-sm p-2.5 rounded-xl outline-none resize-y"
                    style={{ border: '1px solid #d2d2d7', background: '#fff' }}
                />
            </div>
        );

        // Toggle radio-like checkbox group
        const RadioGroup = ({ label, options, value, onChange, columns=1 }) => (
            <div>
                {label && <label className="block text-xs mb-2" style={{ color: '#6e6e73' }}>{label}</label>}
                <div style={{ display:'grid', gridTemplateColumns:`repeat(${columns}, minmax(0, 1fr))`, gap:'6px' }}>
                    {options.map(opt => (
                        <label key={opt.value}
                            className="flex items-center gap-2 cursor-pointer p-2 rounded-xl transition"
                            style={{
                                background: value === opt.value ? 'rgba(0,113,227,0.08)' : '#f5f5f7',
                                border: value === opt.value ? '1px solid #0071e3' : '1px solid #e8e8ed'
                            }}>
                            <input
                                type="radio"
                                checked={value === opt.value}
                                onChange={()=>onChange(opt.value)}
                                className="w-4 h-4 cursor-pointer accent-blue-600"
                            />
                            <span className="text-xs font-medium select-none" style={{ color: '#1d1d1f' }}>{opt.label}</span>
                        </label>
                    ))}
                </div>
            </div>
        );

        // ========================================
        // APP PRINCIPAL
        // ========================================
        const DEFAULT_DATA = {
            // Estabelecimento
            cnes: '',
            estabelecimento: '',
            // Paciente
            pacienteNome: '',
            maeNome: '',
            peso: '',
            altura: '',
            // Medicamentos: 6 linhas; cada uma tem nome e 6 quantidades
            medicamentos: Array.from({length:6}, () => ({ nome:'', q:['','','','','',''] })),
            // Diagnóstico
            cid: '',
            diagnostico: '',
            anamnese: '',
            tratamentoPrevio: '', // 'NAO' | 'SIM'
            tratamentoPrevioRelato: '',
            incapaz: '', // 'NAO' | 'SIM'
            responsavelNome: '',
            // Médico
            medicoNome: '',
            medicoCNS: '',
            dataSolicitacao: '',
            // Preenchimento (18-23)
            preenchidoPor: '',
            outroNome: '',
            outroCPF: '',
            raca: '',
            etnia: '',
            telefone: '',
            docTipo: '',
            docNumero: '',
            email: ''
        };

        const App = () => {
            // Dados que persistem entre receitas (médico + estabelecimento)
            const [persistente, setPersistente] = useState(() => loadLS('lme_persistente', {
                cnes: '',
                estabelecimento: '',
                medicoNome: '',
                medicoCNS: ''
            }));

            const [data, setData] = useState(() => {
                const saved = loadLS('lme_draft', null);
                if (saved) return { ...DEFAULT_DATA, ...saved };
                return { ...DEFAULT_DATA };
            });

            const [showSettings, setShowSettings] = useState(false);
            const [activeTab, setActiveTab] = useState('paciente'); // paciente | meds | diag | preench

            // Garantir que dados persistentes apareçam no formulário
            useEffect(() => {
                setData(d => ({
                    ...d,
                    cnes: d.cnes || persistente.cnes,
                    estabelecimento: d.estabelecimento || persistente.estabelecimento,
                    medicoNome: d.medicoNome || persistente.medicoNome,
                    medicoCNS: d.medicoCNS || persistente.medicoCNS
                }));
            // eslint-disable-next-line
            }, []);

            // Auto-save
            useEffect(() => {
                localStorage.setItem('lme_draft', JSON.stringify(data));
            }, [data]);
            useEffect(() => {
                localStorage.setItem('lme_persistente', JSON.stringify(persistente));
            }, [persistente]);

            const update = useCallback((field, value) => {
                setData(d => ({ ...d, [field]: value }));
            }, []);

            const updateMed = useCallback((idx, field, value) => {
                setData(d => {
                    const meds = [...d.medicamentos];
                    if (field === 'nome') {
                        meds[idx] = { ...meds[idx], nome: value };
                    } else if (field.startsWith('q')) {
                        const qIdx = parseInt(field.slice(1));
                        const q = [...meds[idx].q];
                        q[qIdx] = value;
                        meds[idx] = { ...meds[idx], q };
                    }
                    return { ...d, medicamentos: meds };
                });
            }, []);

            const handleSelectCID = useCallback((it) => {
                setData(d => ({ ...d, cid: it.code, diagnostico: d.diagnostico || it.desc }));
            }, []);

            const handleClearPaciente = () => {
                if (!confirm('Limpar todos os dados do paciente? (Os dados do médico e estabelecimento serão preservados.)')) return;
                setData(d => ({
                    ...DEFAULT_DATA,
                    cnes: d.cnes,
                    estabelecimento: d.estabelecimento,
                    medicoNome: d.medicoNome,
                    medicoCNS: d.medicoCNS
                }));
            };

            const handleClearAll = () => {
                if (!confirm('Limpar TUDO, incluindo dados do médico/estabelecimento?')) return;
                setData({ ...DEFAULT_DATA });
                setPersistente({ cnes:'', estabelecimento:'', medicoNome:'', medicoCNS:'' });
                localStorage.removeItem('lme_draft');
                localStorage.removeItem('lme_persistente');
            };

            const handlePrint = () => {
                setPersistente({
                    cnes: data.cnes,
                    estabelecimento: data.estabelecimento,
                    medicoNome: data.medicoNome,
                    medicoCNS: data.medicoCNS
                });
                setTimeout(() => window.print(), 100);
            };

            const [genPDF, setGenPDF] = useState(false);
            const handleDownloadPDF = useCallback(async () => {
                if (genPDF) return;
                setGenPDF(true);
                try {
                    const node = document.querySelector('.preview-area .lme-page');
                    if (!node) return;

                    const dateStr = todayISO();
                    const slug = (data.pacienteNome || 'paciente').trim()
                        .replace(/\s+/g, '_')
                        .normalize("NFD").replace(new RegExp("[\\u0300-\\u036f]", "g"), "");
                    const fileName = `LME_${slug}_${dateStr}.pdf`;

                    const opt = {
                        margin: 0,
                        filename: fileName,
                        image: { type: 'jpeg', quality: 0.98 },
                        html2canvas: { scale: 2, useCORS: true, letterRendering: true, scrollY: 0 },
                        jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
                    };

                    await html2pdf().set(opt).from(node).save();
                } catch (e) {
                    console.error('Erro ao gerar PDF:', e);
                    alert('Erro ao gerar PDF. Use a opção Imprimir → Salvar como PDF do navegador.');
                } finally {
                    setGenPDF(false);
                }
            }, [data, genPDF]);

            return (
                <React.Fragment>
                    <div className="flex flex-col md:flex-row md:h-screen md:overflow-hidden no-print panel">

                        {/* COLUNA ESQUERDA */}
                        <div className="w-full md:w-[480px] flex flex-col md:h-full shrink-0"
                            style={{ background: 'rgba(255,255,255,0.85)', backdropFilter:'saturate(180%) blur(20px)', WebkitBackdropFilter:'saturate(180%) blur(20px)', borderRight: '1px solid #d2d2d7' }}>

                            {/* Header */}
                            <div className="px-6 py-5 flex justify-between items-center" style={{ borderBottom: '1px solid #d2d2d7' }}>
                                <div>
                                    <h1 className="text-xl font-semibold tracking-tight" style={{ letterSpacing:'-0.02em' }}>LME Rápida</h1>
                                    <p className="text-xs mt-0.5" style={{ color:'#6e6e73' }}>Laudo de Solicitação de Medicamento — SUS</p>
                                </div>
                                <button onClick={()=>setShowSettings(s=>!s)}
                                    className="p-2.5 rounded-full transition-all"
                                    style={{ background: showSettings ? '#e8e8ed' : 'transparent', color:'#1d1d1f' }}
                                    title="Configurações do médico/estabelecimento">
                                    <Icons.Settings />
                                </button>
                            </div>

                            {/* Tabs */}
                            <div className="px-4 pt-3 flex gap-1 overflow-x-auto hide-scrollbar" style={{ borderBottom: '1px solid #e8e8ed' }}>
                                {[
                                    {id:'paciente', label:'Paciente'},
                                    {id:'meds', label:'Medicamentos'},
                                    {id:'diag', label:'Diagnóstico'},
                                    {id:'preench', label:'Preenchimento'}
                                ].map(tab => (
                                    <button key={tab.id} onClick={()=>setActiveTab(tab.id)}
                                        className="px-4 py-2 text-xs font-medium rounded-t-lg whitespace-nowrap transition-all"
                                        style={{
                                            color: activeTab === tab.id ? '#0071e3' : '#6e6e73',
                                            borderBottom: activeTab === tab.id ? '2px solid #0071e3' : '2px solid transparent',
                                            marginBottom: '-1px'
                                        }}>
                                        {tab.label}
                                    </button>
                                ))}
                            </div>

                            {/* Corpo do painel */}
                            <div className="flex-1 overflow-y-auto px-6 py-5 hide-scrollbar space-y-6">

                                {/* ===== Settings: Médico + Estabelecimento ===== */}
                                {showSettings && (
                                    <div className="p-5 rounded-2xl space-y-4" style={{ background: '#f5f5f7', border: '1px solid #e8e8ed' }}>
                                        <h3 className="text-xs font-semibold uppercase" style={{ color:'#6e6e73', letterSpacing:'0.06em' }}>Estabelecimento de Saúde</h3>
                                        <div className="grid grid-cols-3 gap-2">
                                            <Input label="CNES" value={data.cnes} onChange={(v)=>update('cnes', formatCNES(v))} placeholder="0000000" />
                                            <div className="col-span-2">
                                                <Input label="Nome do estabelecimento" value={data.estabelecimento} onChange={(v)=>update('estabelecimento', v)} placeholder="Hospital / UBS / Clínica" />
                                            </div>
                                        </div>
                                        <hr style={{ border:'none', borderTop:'1px solid #e8e8ed' }} />
                                        <h3 className="text-xs font-semibold uppercase" style={{ color:'#6e6e73', letterSpacing:'0.06em' }}>Dados do Médico Solicitante</h3>
                                        <Input label="Nome do médico" value={data.medicoNome} onChange={(v)=>update('medicoNome', v)} placeholder="Dr(a). Nome Completo" />
                                        <Input label="CNS do médico (15 dígitos)" value={data.medicoCNS} onChange={(v)=>update('medicoCNS', formatCNS(v))} placeholder="000 0000 0000 0000" maxLength={19} />
                                        <p className="text-xs" style={{ color:'#86868b' }}>
                                            Esses dados ficam salvos no navegador e são preservados ao usar "Limpar paciente". A assinatura e o carimbo são feitos manualmente após a impressão.
                                        </p>
                                    </div>
                                )}

                                {/* ===== TAB: Paciente ===== */}
                                {activeTab === 'paciente' && (
                                    <div className="space-y-4">
                                        <h3 className="text-xs font-semibold uppercase" style={{ color:'#6e6e73', letterSpacing:'0.06em' }}>Identificação do Paciente</h3>
                                        <Input label="Nome completo do paciente" required value={data.pacienteNome} onChange={(v)=>update('pacienteNome', v)} placeholder="Nome completo" />
                                        <Input label="Nome da mãe" required value={data.maeNome} onChange={(v)=>update('maeNome', v)} placeholder="Nome completo da mãe" />
                                        <div className="grid grid-cols-2 gap-3">
                                            <Input label="Peso" required value={data.peso} onChange={(v)=>update('peso', v)} placeholder="70" rightAddon="kg" />
                                            <Input label="Altura" required value={data.altura} onChange={(v)=>update('altura', v)} placeholder="170" rightAddon="cm" />
                                        </div>
                                        <Input label="Telefone(s) para contato" value={data.telefone} onChange={(v)=>update('telefone', formatPhone(v))} placeholder="(00) 00000-0000" />
                                        <Input label="E-mail do paciente" type="email" value={data.email} onChange={(v)=>update('email', v)} placeholder="paciente@email.com" />

                                        <hr style={{ border:'none', borderTop:'1px solid #e8e8ed' }} />

                                        <h3 className="text-xs font-semibold uppercase" style={{ color:'#6e6e73', letterSpacing:'0.06em' }}>Documento</h3>
                                        <RadioGroup
                                            label="Tipo de documento"
                                            value={data.docTipo}
                                            onChange={(v)=>update('docTipo', v)}
                                            options={[{value:'CPF', label:'CPF'}, {value:'CNS', label:'CNS'}]}
                                            columns={2}
                                        />
                                        <Input
                                            label="Número do documento"
                                            value={data.docNumero}
                                            onChange={(v)=>{
                                                if (data.docTipo === 'CPF') update('docNumero', formatCPF(v));
                                                else if (data.docTipo === 'CNS') update('docNumero', formatCNS(v));
                                                else update('docNumero', v);
                                            }}
                                            placeholder={data.docTipo === 'CPF' ? '000.000.000-00' : data.docTipo === 'CNS' ? '000 0000 0000 0000' : 'Selecione o tipo'}
                                        />

                                        <hr style={{ border:'none', borderTop:'1px solid #e8e8ed' }} />

                                        <RadioGroup
                                            label="Raça/Cor/Etnia (informado pelo paciente)"
                                            value={data.raca}
                                            onChange={(v)=>update('raca', v)}
                                            options={[
                                                {value:'branca', label:'Branca'},
                                                {value:'preta', label:'Preta'},
                                                {value:'parda', label:'Parda'},
                                                {value:'amarela', label:'Amarela'},
                                                {value:'indigena', label:'Indígena'},
                                                {value:'sem_info', label:'Sem informação'}
                                            ]}
                                            columns={2}
                                        />
                                        {data.raca === 'indigena' && (
                                            <Input label="Etnia indígena" value={data.etnia} onChange={(v)=>update('etnia', v)} placeholder="Informar etnia" />
                                        )}
                                    </div>
                                )}

                                {/* ===== TAB: Medicamentos ===== */}
                                {activeTab === 'meds' && (
                                    <div className="space-y-4">
                                        <h3 className="text-xs font-semibold uppercase" style={{ color:'#6e6e73', letterSpacing:'0.06em' }}>Medicamentos e Quantidades (até 6)</h3>
                                        <p className="text-xs" style={{ color:'#86868b' }}>Informe o nome e a quantidade solicitada para cada um dos 6 meses.</p>

                                        {data.medicamentos.map((m, idx) => (
                                            <div key={idx} className="p-3 rounded-2xl" style={{ background:'#fff', border:'1px solid #e8e8ed' }}>
                                                <div className="flex items-center gap-2 mb-2">
                                                    <span className="text-xs font-semibold px-2 py-0.5 rounded-lg" style={{ color:'#6e6e73', background:'#f5f5f7' }}>#{idx+1}</span>
                                                    <input
                                                        type="text"
                                                        value={m.nome}
                                                        onChange={(e)=>updateMed(idx, 'nome', e.target.value)}
                                                        placeholder={`Medicamento ${idx+1} (princípio ativo, concentração, apresentação)`}
                                                        className="flex-1 p-2 text-sm outline-none bg-transparent"
                                                        style={{ borderBottom:'1px solid #d2d2d7' }}
                                                    />
                                                </div>
                                                <div className="grid grid-cols-6 gap-1">
                                                    {[0,1,2,3,4,5].map(j => (
                                                        <div key={j}>
                                                            <label className="block text-[9px] mb-0.5 text-center" style={{ color:'#86868b' }}>{j+1}º mês</label>
                                                            <input
                                                                type="text"
                                                                value={m.q[j]}
                                                                onChange={(e)=>updateMed(idx, `q${j}`, e.target.value)}
                                                                placeholder="0"
                                                                className="w-full text-center p-1.5 text-xs rounded-lg outline-none"
                                                                style={{ border:'1px solid #d2d2d7', background:'#fbfbfd' }}
                                                            />
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                )}

                                {/* ===== TAB: Diagnóstico ===== */}
                                {activeTab === 'diag' && (
                                    <div className="space-y-4">
                                        <h3 className="text-xs font-semibold uppercase" style={{ color:'#6e6e73', letterSpacing:'0.06em' }}>CID-10 e Diagnóstico</h3>

                                        <div>
                                            <label className="block text-xs mb-1.5" style={{ color:'#6e6e73' }}>Buscar CID-10</label>
                                            <CID10Search onSelect={handleSelectCID} />
                                        </div>

                                        <div className="grid grid-cols-3 gap-3">
                                            <Input label="CID-10" required value={data.cid} onChange={(v)=>update('cid', v.toUpperCase())} placeholder="A00.0" />
                                            <div className="col-span-2">
                                                <Input label="Diagnóstico" value={data.diagnostico} onChange={(v)=>update('diagnostico', v)} placeholder="Descrição do diagnóstico" />
                                            </div>
                                        </div>

                                        <Textarea label="Anamnese" required value={data.anamnese} onChange={(v)=>update('anamnese', v)} rows={6} placeholder="Histórico clínico, exame físico, exames complementares, evolução..." />

                                        <hr style={{ border:'none', borderTop:'1px solid #e8e8ed' }} />

                                        <RadioGroup
                                            label="Tratamento prévio ou em curso?"
                                            value={data.tratamentoPrevio}
                                            onChange={(v)=>update('tratamentoPrevio', v)}
                                            options={[{value:'NAO', label:'NÃO'}, {value:'SIM', label:'SIM, relatar abaixo'}]}
                                            columns={2}
                                        />
                                        {data.tratamentoPrevio === 'SIM' && (
                                            <Textarea label="Relato do tratamento prévio" value={data.tratamentoPrevioRelato} onChange={(v)=>update('tratamentoPrevioRelato', v)} rows={3} placeholder="Medicamentos, doses, duração, resposta..." />
                                        )}

                                        <hr style={{ border:'none', borderTop:'1px solid #e8e8ed' }} />

                                        <h3 className="text-xs font-semibold uppercase" style={{ color:'#6e6e73', letterSpacing:'0.06em' }}>Atestado de capacidade</h3>
                                        <p className="text-xs" style={{ color:'#86868b', lineHeight:1.45 }}>
                                            O paciente é considerado incapaz conforme art. 3º e 4º do Código Civil?
                                        </p>
                                        <RadioGroup
                                            value={data.incapaz}
                                            onChange={(v)=>update('incapaz', v)}
                                            options={[{value:'NAO', label:'NÃO'}, {value:'SIM', label:'SIM (responsável solicita)'}]}
                                            columns={2}
                                        />
                                        {data.incapaz === 'SIM' && (
                                            <Input label="Nome do responsável" value={data.responsavelNome} onChange={(v)=>update('responsavelNome', v)} placeholder="Nome completo do responsável" />
                                        )}

                                        <hr style={{ border:'none', borderTop:'1px solid #e8e8ed' }} />

                                        <h3 className="text-xs font-semibold uppercase" style={{ color:'#6e6e73', letterSpacing:'0.06em' }}>Data da solicitação</h3>
                                        <div className="flex items-center gap-2">
                                            <input
                                                type="date"
                                                value={data.dataSolicitacao}
                                                onChange={(e)=>update('dataSolicitacao', e.target.value)}
                                                className="flex-1 text-sm p-2.5 rounded-xl outline-none"
                                                style={{ border:'1px solid #d2d2d7', background:'#fff' }}
                                            />
                                            <button onClick={()=>update('dataSolicitacao', todayISO())}
                                                className="text-xs px-3 py-2.5 rounded-xl flex items-center gap-1.5"
                                                style={{ background:'#0071e3', color:'#fff', border:'none', cursor:'pointer' }}>
                                                <Icons.Calendar /> Hoje
                                            </button>
                                            <button onClick={()=>update('dataSolicitacao', '')}
                                                className="text-xs px-3 py-2.5 rounded-xl"
                                                style={{ background:'#f5f5f7', color:'#6e6e73', border:'1px solid #e8e8ed', cursor:'pointer' }}>
                                                Em branco
                                            </button>
                                        </div>
                                        <p className="text-xs" style={{ color:'#86868b' }}>
                                            Deixe em branco para preencher manualmente após a impressão.
                                        </p>
                                    </div>
                                )}

                                {/* ===== TAB: Preenchimento (18-23) ===== */}
                                {activeTab === 'preench' && (
                                    <div className="space-y-4">
                                        <h3 className="text-xs font-semibold uppercase" style={{ color:'#6e6e73', letterSpacing:'0.06em' }}>Quem preencheu este laudo?</h3>
                                        <RadioGroup
                                            value={data.preenchidoPor}
                                            onChange={(v)=>update('preenchidoPor', v)}
                                            options={[
                                                {value:'paciente', label:'Paciente'},
                                                {value:'mae', label:'Mãe do paciente'},
                                                {value:'responsavel', label:'Responsável (item 13)'},
                                                {value:'medico', label:'Médico solicitante'},
                                                {value:'outro', label:'Outro'}
                                            ]}
                                            columns={2}
                                        />
                                        {data.preenchidoPor === 'outro' && (
                                            <div className="grid grid-cols-2 gap-3">
                                                <Input label="Nome de quem preencheu" value={data.outroNome} onChange={(v)=>update('outroNome', v)} placeholder="Nome completo" />
                                                <Input label="CPF" value={data.outroCPF} onChange={(v)=>update('outroCPF', formatCPF(v))} placeholder="000.000.000-00" maxLength={14} />
                                            </div>
                                        )}

                                        <p className="text-xs" style={{ color:'#86868b' }}>
                                            A assinatura no campo 23 deve ser feita manualmente, após a impressão.
                                        </p>
                                    </div>
                                )}
                            </div>

                            {/* Footer de ações */}
                            <div className="px-6 py-4 space-y-2" style={{ borderTop:'1px solid #d2d2d7', background:'rgba(255,255,255,0.6)' }}>
                                <div className="grid grid-cols-2 gap-2">
                                    <button onClick={handleDownloadPDF} disabled={genPDF}
                                        className="apple-btn flex justify-center items-center gap-2"
                                        style={{ fontSize:'14px', padding:'11px 16px' }}>
                                        <Icons.Download /> {genPDF ? 'Gerando…' : 'Baixar PDF'}
                                    </button>
                                    <button onClick={handlePrint}
                                        className="apple-btn flex justify-center items-center gap-2"
                                        style={{ fontSize:'14px', padding:'11px 16px' }}>
                                        <Icons.Printer /> Imprimir
                                    </button>
                                </div>
                                <div className="grid grid-cols-2 gap-2">
                                    <button onClick={handleClearPaciente}
                                        className="flex justify-center items-center gap-2 py-2.5 rounded-full text-sm font-medium"
                                        style={{ background:'#f5f5f7', color:'#6e6e73', border:'1px solid #e8e8ed', cursor:'pointer' }}>
                                        <Icons.Eraser /> Limpar paciente
                                    </button>
                                    <button onClick={handleClearAll}
                                        className="flex justify-center items-center gap-2 py-2.5 rounded-full text-sm font-medium"
                                        style={{ background:'#f5f5f7', color:'#d00', border:'1px solid #e8e8ed', cursor:'pointer' }}>
                                        <Icons.Trash /> Limpar tudo
                                    </button>
                                </div>
                            </div>
                        </div>

                        {/* COLUNA DIREITA: PREVIEW */}
                        <div className="flex-1 overflow-y-auto p-4 md:p-8 hide-scrollbar preview-area" style={{ background:'#f5f5f7' }}>
                            <div className="max-w-4xl mx-auto">
                                <div className="mb-4 p-3 rounded-xl text-xs flex items-start gap-2"
                                    style={{ background:'#fff', border:'1px solid #d2d2d7', color:'#1d1d1f' }}>
                                    <span style={{ fontSize:'14px' }}>ℹ️</span>
                                    <span style={{ color:'#6e6e73' }}>
                                        O preview abaixo reproduz o layout do PDF oficial do SUS. Ao imprimir ou exportar, o resultado fica idêntico em A4.
                                    </span>
                                </div>
                                <LMEPage data={data} />
                            </div>
                        </div>
                    </div>

                    {/* Área de impressão (espelho do preview, sem sombra/margem) */}
                    <div className="print-area">
                        <LMEPage data={data} />
                    </div>
                </React.Fragment>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
